name: Publish to NuGet

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when a version tag is pushed (e.g., v1.0.0)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # CRITICAL: Required for requesting the OIDC JWT token from GitHub
      contents: read  # Required to check out the source code

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x' # Uses the stable .NET 8 SDK

      # Intercambia el OIDC JWT de GitHub por una credencial temporal en NuGet.org
      - name: NuGet Login
        id: login
        uses: NuGet/login@v1
        with:
          user: NicoVega # Tu usuario de NuGet.org (dueño de la política de publicación)

      # Restaurar solo el proyecto del paquete NuGet y el de pruebas (evitando el VSIX de Windows)
      - name: Restore Dependencies
        run: |
          dotnet restore CleanArchitectureAnalyzer/CleanArchitectureAnalyzer.Package/CleanArchitectureAnalyzer.Package.csproj
          dotnet restore CleanArchitectureAnalyzer/CleanArchitectureAnalyzer.Test/CleanArchitectureAnalyzer.Test.csproj

      # Compilar solo el empaquetador (esto compila automáticamente sus dependencias: el core del analizador y los CodeFixes)
      - name: Build Package Projects (Release)
        run: |
          dotnet build CleanArchitectureAnalyzer/CleanArchitectureAnalyzer.Package/CleanArchitectureAnalyzer.Package.csproj -c Release
          dotnet build CleanArchitectureAnalyzer/CleanArchitectureAnalyzer.Test/CleanArchitectureAnalyzer.Test.csproj -c Release

      # Ejecutar las pruebas unitarias
      - name: Run Unit Tests
        run: dotnet test CleanArchitectureAnalyzer/CleanArchitectureAnalyzer.Test/CleanArchitectureAnalyzer.Test.csproj -c Release --no-build

      # Generar el paquete NuGet (.nupkg)
      - name: Pack NuGet Package
        run: dotnet pack CleanArchitectureAnalyzer/CleanArchitectureAnalyzer.Package/CleanArchitectureAnalyzer.Package.csproj -c Release --no-build -o ./dist

      # Publicar a NuGet.org usando la credencial temporal configurada por NuGet/login
      - name: Publish to NuGet.org
        run: dotnet nuget push ./dist/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
